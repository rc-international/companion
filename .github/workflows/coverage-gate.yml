name: Coverage Gate

on:
  pull_request:
    branches: [main]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: web
        run: bun install

      - name: Run tests with coverage
        working-directory: web
        run: bun run test -- --coverage || true

      - name: Enforce 80% coverage on new / changed files
        run: |
          SUMMARY="web/coverage/coverage-summary.json"
          if [ ! -f "$SUMMARY" ]; then
            echo "::error::coverage-summary.json not found — tests may have crashed."
            exit 1
          fi

          # Absolute path prefix used by Istanbul in the JSON keys
          ABS_PREFIX="$(pwd)/web/"

          FILE_FILTER='\.test\.\|\.spec\.\|__mocks__\|test-setup\|session-types\.ts\|src/types\.ts'

          # New files must meet the strict threshold
          ADDED=$(git diff --name-only --diff-filter=A origin/main...HEAD -- web/server/ web/src/ \
            | grep -E '\.(ts|tsx)$' \
            | grep -v "$FILE_FILTER" || true)

          # Modified files are reported but don't block the PR
          MODIFIED=$(git diff --name-only --diff-filter=CM origin/main...HEAD -- web/server/ web/src/ \
            | grep -E '\.(ts|tsx)$' \
            | grep -v "$FILE_FILTER" || true)

          if [ -z "$ADDED" ] && [ -z "$MODIFIED" ]; then
            echo "No new/changed source files in this PR — nothing to gate."
            exit 0
          fi

          FAIL=0
          THRESHOLD=80

          check_file() {
            local file=$1 strict=$2
            local ABS_KEY="$(pwd)/${file}"
            local DISPLAY="${file#web/}"
            local LINES_PCT=$(jq -r --arg f "$ABS_KEY" '.[$f].lines.pct // empty' "$SUMMARY")

            if [ -z "$LINES_PCT" ]; then
              if [ "$strict" = "1" ]; then
                echo "❌ $DISPLAY — no coverage data (treated as 0%)"
                FAIL=1
              else
                echo "⚠️  $DISPLAY — no coverage data (modified file, not blocking)"
              fi
              return
            fi

            local BELOW=$(awk "BEGIN { print ($LINES_PCT < $THRESHOLD) ? 1 : 0 }")
            if [ "$BELOW" = "1" ]; then
              if [ "$strict" = "1" ]; then
                echo "❌ $DISPLAY — ${LINES_PCT}% lines covered (threshold: ${THRESHOLD}%)"
                FAIL=1
              else
                echo "⚠️  $DISPLAY — ${LINES_PCT}% lines covered (modified file, not blocking)"
              fi
            else
              echo "✅ $DISPLAY — ${LINES_PCT}% lines covered"
            fi
          }

          if [ -n "$ADDED" ]; then
            echo "=== New files (must meet ${THRESHOLD}% threshold) ==="
            for file in $ADDED; do check_file "$file" 1; done
            echo ""
          fi

          if [ -n "$MODIFIED" ]; then
            echo "=== Modified files (coverage reported, not gated) ==="
            for file in $MODIFIED; do check_file "$file" 0; done
            echo ""
          fi

          echo ""
          if [ "$FAIL" = "1" ]; then
            echo "::error::Coverage gate failed — one or more changed files are below ${THRESHOLD}% line coverage."
            echo "Add tests for the files listed above to bring them above the threshold."
            exit 1
          else
            echo "All changed files meet the ${THRESHOLD}% line coverage threshold."
          fi
